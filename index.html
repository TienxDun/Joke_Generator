<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
      <rect width='100' height='100' rx='25' fill='black'/>
      <text x='50%' y='68%' font-family='sans-serif' font-size='60' font-weight='800' fill='white' text-anchor='middle'>D</text>
      <path d='M80 20 L83 28 L91 31 L83 34 L80 42 L77 34 L69 31 L77 28 Z' fill='%23fef08a'/>
    </svg>">

    <title>Máy Tạo Joke Ngẫu Nhiên</title>
    <!-- Favicon inline để tránh lỗi 404 -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>😂</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Three.js and GSAP -->
    <script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.173.0/build/three.module.js"
  }
}
</script>
<script type="module">
    import * as THREE from 'three';
    window.THREE = THREE;
</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>

<body>
    <!-- 3D Background Canvas -->
    <canvas id="canvas3d"></canvas>

    <div class="container main-ui">
        <header class="header">
            <h1 class="reveal-text">Máy Tạo Joke Ngẫu Nhiên</h1>
            <div class="emoji">😂</div>
        </header>

        <main class="main-content">
            <div class="joke-container">
                <div class="joke-display">
                    <div class="joke-tools">
                        <button id="copy-btn" class="tool-btn" title="Sao chép">📋</button>
                        <button id="speak-btn" class="tool-btn" title="Đọc joke">🔊</button>
                    </div>
                    <p id="joke-text">Chào bạn! Nhấn nút để bắt đầu ngày mới với niềm vui nhé! ✨</p>
                    <p id="punchline"></p>
                </div>

                <div id="explanation" class="explanation" style="display: none;">
                    <div class="explanation-header">
                        <span class="explanation-icon">💡</span>
                        <span class="explanation-title">Giải thích</span>
                        <button id="close-explanation" class="close-btn">×</button>
                    </div>
                    <div class="explanation-content"></div>
                </div>
            </div>

            <div class="button-group">
                <button id="get-joke-btn" class="joke-btn primary-btn">
                    <span class="btn-icon">🎲</span>
                    <span class="btn-text">Nhận Joke Mới</span>
                </button>

                <div class="secondary-buttons">
                    <button id="translate-btn" class="joke-btn secondary-btn" style="display: none;">
                        <span class="btn-icon">🌐</span>
                        <span class="btn-text">Dịch Tiếng Việt</span>
                    </button>

                    <button id="explain-btn" class="joke-btn secondary-btn" style="display: none;">
                        <span class="btn-icon">🤔</span>
                        <span class="btn-text">Giải thích</span>
                    </button>

                    <button id="save-btn" class="joke-btn secondary-btn" style="display: none;">
                        <span class="btn-icon">❤️</span>
                        <span class="btn-text">Lưu</span>
                    </button>

                    <button id="view-saved-btn" class="joke-btn secondary-btn full-width">
                        <span class="btn-icon">📂</span>
                        <span class="btn-text">Đã Lưu</span>
                    </button>
                </div>
            </div>

            <!-- Saved Jokes Modal -->
            <div id="saved-jokes-modal" class="modal" style="display: none;">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2>Kho Tàng Joke (<span id="saved-count">0</span>)</h2>
                        <button id="close-saved-btn" class="close-btn">×</button>
                    </div>
                    <div id="saved-list" class="saved-list">
                        <!-- Jokes will be injected here -->
                        <p class="empty-state">Chưa lưu joke nào cả!</p>
                    </div>
                </div>
            </div>

            <div class="settings-group">
                <div class="model-selector">
                    <label for="model-select">Trí tuệ nhân tạo</label>
                    <div class="select-wrapper">
                        <select id="model-select" class="model-dropdown">
                            <option value="gemini-3-flash">Gemini 3 Flash</option>
                            <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                            <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash Lite</option>
                        </select>
                    </div>
                </div>

                <div class="bg-selector">
                    <label for="bg-select">Không gian 3D</label>
                    <div class="select-wrapper">
                        <select id="bg-select" class="model-dropdown">
                            <option value="waves" selected>Neon Waves</option>
                            <option value="torus">Classic Knot</option>
                            <option value="particles">Deep Space</option>
                            <option value="floating">Geometric</option>
                            <option value="wormhole">Wormhole</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="loader" id="loader"></div>
        </main>
    </div>
    <script src="script.js" type="module"></script>
</body>

</html>
